<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password | Flexi Educational Consult</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; background-color: #ffffff; color: #002147; margin: 0; }
        .brand-header { width: 100%; background-color: #002147; padding: 18px 0; text-align: center; border-bottom: 5px solid #2b7a43; margin-bottom: 40px; }
        .brand-title { color: #ffffff; font-size: 16px; font-weight: bold; letter-spacing: 0.8px; margin: 0; text-transform: uppercase; }
        .form-container { width: 100%; max-width: 360px; padding: 20px; box-sizing: border-box; }
        .form-title { font-size: 24px; font-weight: bold; color: #002147; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 15px; margin-bottom: 8px; color: #333333; font-weight: 600; }
        input { width: 100%; padding: 14px; background-color: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 16px; color: #333333; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #002147; }
        .strength-container { margin-top: -10px; margin-bottom: 12px; }
        .strength-bar-wrapper { height: 4px; background-color: #f0f0f0; border-radius: 2px; overflow: hidden; width: 100%; }
        .strength-bar { height: 100%; width: 0%; transition: width 0.3s ease, background-color 0.3s ease; }
        .strength-text { font-size: 12px; margin-top: 5px; text-align: right; color: #777777; display: block; font-weight: 500; }
        .requirements-box { margin-bottom: 20px; padding: 5px 0; text-align: left; }
        .criteria { font-size: 13px; color: #777777; margin: 4px 0; display: flex; align-items: center; transition: color 0.2s ease; }
        .criteria::before { content: "•"; margin-right: 8px; font-size: 16px; }
        .criteria.valid { color: #2b7a43; font-weight: 500; }
        .criteria.invalid { color: #dc3545; }
        button { width: 100%; padding: 14px; background-color: #002147; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; transition: background-color 0.2s; }
        button:hover { background-color: #001530; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #message { margin-top: 20px; font-size: 14px; text-align: center; font-weight: 500; color: #666666; }
    </style>
</head>
<body>

<div class="brand-header"><h1 class="brand-title">Flexi Educational Consult</h1></div>

<div class="form-container">
    <div class="form-title">Create New Password</div>
    <div class="form-group">
        <label for="new-password">Create new password</label>
        <input type="password" id="new-password" placeholder="••••••••" required />
    </div>
    <div class="strength-container">
        <div class="strength-bar-wrapper"><div id="strength-meter" class="strength-bar"></div></div>
        <span id="strength-label" class="strength-text">Enter a password</span>
    </div>
    <div class="form-group">
        <label for="confirm-password">Confirm your password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" required />
    </div>
    <div class="requirements-box">
        <div id="req-length" class="criteria">At least 6 characters long</div>
        <div id="req-letter" class="criteria">Must contain an alphabet letter (a-z)</div>
        <div id="req-uppercase" class="criteria">Must contain an uppercase letter (A-Z)</div>
        <div id="req-number" class="criteria">Must contain a number (0-9)</div>
    </div>
    <button id="submit-btn">Verify</button>
    <div id="message">Validating verification context...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
        authDomain: "auth.flexieduconsult.com.ng",
        projectId: "waec2026jamb2027"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const messageDiv = document.getElementById('message');
    const passwordInput = document.getElementById('new-password');
    const confirmInput = document.getElementById('confirm-password');
    const submitBtn = document.getElementById('submit-btn');
    
    const urlParams = new URLSearchParams(window.location.search);
    const oobCode = urlParams.get('oobCode');

    // Initialization check
    if (!oobCode) {
        messageDiv.style.color = "#dc3545";
        messageDiv.innerText = "Error: Invalid link.";
        submitBtn.disabled = true;
    } else {
        verifyPasswordResetCode(auth, oobCode).catch(() => {
            messageDiv.style.color = "#dc3545";
            messageDiv.innerText = "This link has expired or is invalid.";
            submitBtn.disabled = true;
        });
    }

    submitBtn.addEventListener('click', () => {
        const passVal = passwordInput.value;
        const confirmVal = confirmInput.value;
        
        if (passVal !== confirmVal) return (messageDiv.innerText = "Passwords do not match.");
        
        submitBtn.disabled = true;
        messageDiv.innerText = "Updating credentials...";

        confirmPasswordReset(auth, oobCode, passVal)
            .then(() => {
                alert("Password reset successful!");
                window.location.href = "https://flexieduconsult.com.ng/login.html";
            })
            .catch((error) => {
                submitBtn.disabled = false;
                messageDiv.innerText = "Error: " + error.message;
            });
    });
</script>
</body>
</html>
